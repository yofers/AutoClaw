# AutoOpenClaw Web manager configuration
# Changes to host/port require restarting the manager process.
# server.host is used for links and page display.
# The manager listens on 0.0.0.0 by default; use security.loopbackOnly to restrict access.

server:
  host: "127.0.0.1"
  port: 31870

site:
  title: "AutoOpenClaw"
  subtitle: "本地优先、状态清晰、动作可回退的 OpenClaw 控制面板"

auth:
  enabled: true
  username: "root"
  password: "root"
  sessionTtlHours: 12

security:
  loopbackOnly: true
